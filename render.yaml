services:
  - type: web
    name: phase1-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 app:app
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: TEST_MODE
        sync: false
      - key: TEST_PASSWORD
        sync: false
